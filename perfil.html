<!DOCTYPE html>
<html>
<head>
  <title>Perfil</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
  <h1>👤 Mi Perfil</h1>

  <p><strong>Correo:</strong></p>
  <p id="usuario"></p>

  <h2>Datos personales</h2>

  <input type="text" id="nombre" placeholder="Nombre completo">
  <input type="number" id="edad" placeholder="Edad">
  <input type="text" id="sexo" placeholder="Sexo">
  <input type="text" id="telefono" placeholder="Número de teléfono">

  <!-- EXTRA PRO -->
  <input type="text" id="deporte" placeholder="Deporte favorito ⚽">
  <input type="text" id="nivel" placeholder="Nivel (Principiante/Intermedio/Avanzado)">

  <button onclick="guardarPerfil()">Guardar</button>

  <button onclick="volver()">Volver</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY_REAL",
  authDomain: "courtify-61b99.firebaseapp.com",
  projectId: "courtify-61b99",
  appId: "1:796727690755:web:e701204c38cc85f2813036"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Mostrar usuario
const user = auth.currentUser;
if (user) {
  document.getElementById("usuario").textContent = user.email;
}

// Guardar perfil
async function guardarPerfil() {
  const user = auth.currentUser;

  if (!user) {
    alert("Debes iniciar sesión");
    return;
  }

  const datos = {
    nombre: document.getElementById("nombre").value,
    edad: document.getElementById("edad").value,
    sexo: document.getElementById("sexo").value,
    telefono: document.getElementById("telefono").value,
    deporte: document.getElementById("deporte").value,
    nivel: document.getElementById("nivel").value
  };

  await setDoc(doc(db, "usuarios", user.uid), datos);

  alert("Perfil guardado");
}

window.guardarPerfil = guardarPerfil;
window.volver = () => window.location.href = "reservas.html";
</script>

</body>
</html>
