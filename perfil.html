<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Courtify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="perfil-header">
      <h1>👤 Mi Perfil</h1>
      <p>Completa tu información personal</p>
    </div>

    <div class="perfil-card">
      <div class="perfil-avatar">👤</div>
      <h2 id="nombrePerfil">Usuario Courtify</h2>
      <p><strong>Correo:</strong> <span id="usuario">Cargando...</span></p>
    </div>

    <div class="perfil-info-card">
      <h3>Datos personales</h3>

      <div class="perfil-form">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="number" id="edad" placeholder="Edad">
        <input type="text" id="sexo" placeholder="Sexo">
        <input type="text" id="telefono" placeholder="Número de teléfono">
        <input type="text" id="deporte" placeholder="Deporte favorito">
        <input type="text" id="nivel" placeholder="Nivel (Principiante/Intermedio/Avanzado)">
      </div>
    </div>

<div class="perfil-botones">
  <button class="btn-secundario" onclick="guardarPerfil()">Guardar</button>
  <button class="btn-volver" onclick="irHome()">Volver</button>
  <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>
  </div>

  <div class="bottom-nav">
    <button onclick="irHome()">🏠<span>Inicio</span></button>
    <button onclick="irMisReservas()">📅<span>Reservas</span></button>
    <button onclick="irPerfil()">👤<span>Perfil</span></button>
  </div>

  <script type="module" src="app.js"></script>
  <script type="module" src="perfil.js"></script>

</body>
</html>
