<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago - Courtify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="perfil-header">
      <h1>💳 Método de pago</h1>
      <p>Confirma tu reserva y completa el pago</p>
    </div>

    <div class="cancha-seleccionada-card">
      <img id="resumenImagenPago" src="" alt="Cancha seleccionada">
      <div class="cancha-seleccionada-info">
        <h3 id="resumenCanchaPago">Cancha seleccionada</h3>
        <p>Revisa los datos antes de pagar</p>
      </div>
    </div>

    <div class="perfil-info-card">
      <h3>Resumen de la reserva</h3>

      <div class="resumen-pago">
        <div class="dato-pago">
          <span class="dato-label">Nombre</span>
          <span id="resumenNombrePago" class="dato-valor">-</span>
        </div>

        <div class="dato-pago">
          <span class="dato-label">Cancha</span>
          <span id="resumenCanchaPagoTexto" class="dato-valor">-</span>
        </div>

        <div class="dato-pago">
          <span class="dato-label">Fecha</span>
          <span id="resumenFechaPago" class="dato-valor">-</span>
        </div>

        <div class="dato-pago">
          <span class="dato-label">Hora</span>
          <span id="resumenHoraPago" class="dato-valor">-</span>
        </div>

        <div class="dato-pago total-pago">
          <span class="dato-label">Total</span>
          <span class="dato-valor">$18.000</span>
        </div>
      </div>
    </div>

    <div class="perfil-info-card">
      <h3>Selecciona un método de pago</h3>

      <div class="metodos-pago">
        <label class="metodo-card">
          <input type="radio" name="metodoPago" value="debito" checked>
          <span>💳 Tarjeta de débito</span>
        </label>

        <label class="metodo-card">
          <input type="radio" name="metodoPago" value="credito">
          <span>💳 Tarjeta de crédito</span>
        </label>

        <label class="metodo-card">
          <input type="radio" name="metodoPago" value="transferencia">
          <span>🏦 Transferencia</span>
        </label>
      </div>
    </div>

    <div class="perfil-botones">
      <button class="btn-secundario" onclick="confirmarPago()">Pagar y confirmar</button>
      <button class="btn-volver" onclick="window.location.href='agendar-reserva.html'">Volver</button>
    </div>

  </div>

  <div class="bottom-nav">
    <button onclick="irHome()">🏠<span>Inicio</span></button>
    <button onclick="irMisReservas()">📅<span>Reservas</span></button>
    <button onclick="irPerfil()">👤<span>Perfil</span></button>
  </div>

  <script type="module" src="app.js"></script>

  <script>
    // Sincroniza el segundo campo de cancha con el principal
    window.addEventListener("load", () => {
      const canchaPrincipal = document.getElementById("resumenCanchaPago");
      const canchaTexto = document.getElementById("resumenCanchaPagoTexto");

      const syncCancha = () => {
        if (canchaPrincipal && canchaTexto) {
          canchaTexto.textContent = canchaPrincipal.textContent || "-";
        }
      };

      setTimeout(syncCancha, 200);
    });
  </script>

</body>
</html>
