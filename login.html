<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Courtify</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">

      <img src="logo.png" alt="Logo Courtify" class="login-logo">

      <h1 class="login-title">Courtify</h1>
      <p class="login-subtitle">Reserva tu cancha. Juega tu pasión.</p>

      <h2 class="login-heading">Iniciar Sesión</h2>

      <div class="login-form">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
      </div>

      <p class="link-recuperar" onclick="recuperarPassword()">
        ¿Olvidaste tu contraseña?
      </p>

      <div class="login-buttons">
        <button id="btnLogin" class="btn-login">Ingresar</button>
        <button id="btnIrRegistro" class="btn-registro">Registrarse</button>
      </div>

    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
